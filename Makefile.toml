[config]
skip_core_tasks = true

[tasks.build]
description = "Build all components (Kernel, APO, HSA)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1 -build"
]

[tasks.package]
description = "Build and Package the driver"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1 -build -package"
]

[tasks.install]
description = "Full Build, Package, and Install (Requires Admin)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1"
]

[tasks.uninstall]
description = "Uninstall the driver and purge system (Requires Admin)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Uninstall.ps1"
]

[tasks.clean]
description = "Full system purge and build artifact cleanup"
dependencies = ["uninstall"]
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1 -clean"
]

[tasks.reinstall]
description = "Full uninstall followed by a fresh install"
dependencies = ["clean", "install"]

[tasks.test]
description = "Run unit tests"
cwd = "crates/leyline-kernel"
command = "cargo"
args = ["test"]

[tasks.test-endpoints]
description = "Test Audio Endpoints"
cwd = "test/EndpointTester"
command = "dotnet"
args = ["run"]

[tasks.package-all]
alias = "package"
