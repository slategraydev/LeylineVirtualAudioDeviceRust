[config]
skip_core_tasks = true

[tasks.build]
description = "Build the driver in release mode"
command = "cargo"
args = ["wdk", "build", "--profile", "release"]

[tasks.test]
description = "Run unit tests"
command = "cargo"
args = ["test"]

[tasks.package]
description = "Package the driver"
command = "cargo"
args = ["wdk", "package"]

[tasks.install]
description = "Install the driver and certificate (Requires Admin)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\install_driver.ps1"
]

[tasks.uninstall]
description = "Uninstall the driver (Requires Admin)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\uninstall_driver.ps1"
]

[tasks.setup-test-signing]
description = "Enable test signing and reboot (requires admin)"
script = [
    "bcdedit /set testsigning on"
]

[tasks.cert-deploy]
description = "Deploy test certificate"
script = [
    "certutil -addstore root WDRLocalTestCert.cer",
    "certutil -addstore TrustedPublisher WDRLocalTestCert.cer"
]

[tasks.package-all]
description = "Full build and package (Kernel + APO + HSA)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\package_driver.ps1"
]
