[config]
skip_core_tasks = true

[tasks.build-kernel]
description = "Build the ACX kernel driver (Rust)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ". .\\scripts\\LaunchBuildEnv.ps1",
    "Push-Location crates/leyline-kernel",
    "cargo wdk build --profile release",
    "Pop-Location"
]

[tasks.build]
description = "Build and stage the driver package (no VM deploy)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1 -BuildOnly"
]

[tasks.build-clean]
description = "Clean build artifacts then build"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1 -BuildOnly -clean"
]

[tasks.deploy]
description = "Build and deploy to TestVM (revert snapshot first)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1"
]

[tasks.deploy-fast]
description = "Build and deploy to TestVM (skip snapshot revert)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1 -fast"
]

[tasks.install]
description = "Full Build, Package, and Deploy to TestVM (revert snapshot)"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Install.ps1"
]

[tasks.uninstall]
description = "Uninstall the driver from TestVM"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Uninstall.ps1"
]

[tasks.clean]
description = "Full clean: uninstall from VM and purge local build artifacts"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ".\\scripts\\Uninstall.ps1",
    ".\\scripts\\Install.ps1 -BuildOnly -clean"
]

[tasks.reinstall]
description = "Full uninstall followed by a fresh deploy"
dependencies = ["uninstall", "deploy"]

[tasks.test]
description = "Run unit tests (shared crate only)"
cwd = "crates/leyline-shared"
command = "cargo"
args = ["test"]

[tasks.clippy]
description = "Run clippy on the workspace"
script_runner = "powershell"
script_extension = "ps1"
script = [
    ". .\\scripts\\LaunchBuildEnv.ps1",
    "cargo clippy --workspace --all-targets -- -D warnings"
]

[tasks.test-endpoints]
description = "Test Audio Endpoints on TestVM"
cwd = "test/EndpointTester"
command = "dotnet"
args = ["run"]

[tasks.package]
alias = "build"
